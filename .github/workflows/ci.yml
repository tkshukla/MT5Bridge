name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-unit-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app tests

      - name: Mypy type check
        run: mypy app --ignore-missing-imports
        continue-on-error: true  # advisory until the codebase is fully annotated

      - name: Unit tests
        run: pytest tests/unit -v

  integration-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mt5bridge
          POSTGRES_PASSWORD: mt5bridge
          POSTGRES_DB: mt5bridge_test
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U mt5bridge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Integration tests (Kotak Neo mocked, real Postgres)
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://mt5bridge:mt5bridge@localhost:5433/mt5bridge_test
          JWT_SECRET_KEY: ci-test-secret-not-for-production
        run: pytest tests/integration -v

  mql5-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Basic MQL5 syntax sanity check (brace/paren balance)
        run: python3 scripts/ci/check_mql5_balance.py mql5/Include/MT5Bridge/*.mqh mql5/Experts/*.mq5
