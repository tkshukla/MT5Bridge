name: Docker build

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main) backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/mt5bridge-backend:latest
            ghcr.io/${{ github.repository_owner }}/mt5bridge-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
