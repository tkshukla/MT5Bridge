# MT5Bridge reverse proxy. Installed to /etc/nginx/sites-available/mt5bridge.conf and
# symlinked into sites-enabled/ by scripts/setup.sh. Certbot rewrites the server block
# below to add TLS directives on first run (certbot --nginx).

limit_req_zone $binary_remote_addr zone=mt5bridge_api:10m rate=20r/s;

# Replace with your MT5 desktop's actual static egress IP (also set MT5_STATIC_IP in
# .env so scripts/setup.sh can template this automatically).
geo $mt5_allowed {
    default 0;
    # 203.0.113.10 1;   # <-- MT5_STATIC_IP
}

server {
    listen 80;
    server_name _;   # replaced with $DOMAIN by scripts/setup.sh

    location /api/v1/health {
        proxy_pass http://127.0.0.1:8000/api/v1/health;
    }

    location /api/v1/ {
        limit_req zone=mt5bridge_api burst=40 nodelay;
        # Defense in depth on top of JWT auth — uncomment once MT5_STATIC_IP is set
        # if $mt5_allowed = 0 { return 403; }

        proxy_pass http://127.0.0.1:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /metrics {
        # Prometheus scrapes this via API key auth (see docs/SECURITY.md); still worth
        # restricting to localhost/internal network if Prometheus doesn't run on this host.
        proxy_pass http://127.0.0.1:8000/metrics;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
